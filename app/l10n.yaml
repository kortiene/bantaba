# gen-l10n config (docs/i18n.md). The template ARB is the translator-facing
# catalog; generated code lands in lib/src/l10n/gen (committed, not synthetic).
arb-dir: lib/src/l10n/arb
template-arb-file: app_en.arb
output-dir: lib/src/l10n/gen
output-localization-file: app_strings.dart
output-class: AppStrings
nullable-getter: false
untranslated-messages-file: build/untranslated_messages.json
# Every key must carry translator metadata (@key with description).
required-resource-attributes: true
# NOTE: leave use-escaping unset — catalog values contain bare apostrophes
# that ICU escaping would reinterpret.
header: "// GENERATED by `flutter gen-l10n` from arb/app_en.arb — edit the ARB (and its @descriptions), never this file."
